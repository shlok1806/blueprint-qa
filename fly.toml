# Fly.io (alternative to Render/Vercel): install `flyctl`, run `fly launch` from repo root,
# set app name, then add secrets (DATABASE_URL, ANTHROPIC_API_KEY, etc.) and `fly deploy`.
# Replace `blueprint-qa` with your unique app name.

app = "blueprint-qa"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "8080"
